name: Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Build Docker image
        run: |
          docker build -t bailogenius-front:latest .

      - name: Save Docker image
        run: |
          docker save bailogenius-front:latest -o /home/ubuntu/bailogenius-front/bailogenius-front.tar

      - name: Copy docker-compose.yml to server
        run: |
          mkdir -p /home/ubuntu/bailogenius-front
          cp docker-compose.yml /home/ubuntu/bailogenius-front/
          cp deploy.sh /home/ubuntu/bailogenius-front/
          chmod +x /home/ubuntu/bailogenius-front/deploy.sh

      - name: Deploy application
        run: |
          cd /home/ubuntu/bailogenius-front
          ./deploy.sh

      - name: Verify deployment
        run: |
          sleep 10
          docker ps | grep bailogenius-front || exit 1

      - name: Send deployment notification
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "🌐 Application is live at https://bailogenius.gaignerot.fr"
