name: Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Create deployment directory
        run: |
          mkdir -p /home/gaignerot/bailogenius-front

      - name: Build Docker image
        run: |
          docker build -t bailogenius-front:latest \
            --build-arg VITE_SUPABASE_PROJECT_ID="${{ secrets.VITE_SUPABASE_PROJECT_ID }}" \
            --build-arg VITE_SUPABASE_PUBLISHABLE_KEY="${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}" \
            --build-arg VITE_SUPABASE_URL="${{ secrets.VITE_SUPABASE_URL }}" \
            --build-arg VITE_SUPABASE_FUNCTIONS_URL="${{ secrets.VITE_SUPABASE_FUNCTIONS_URL }}" \
            --build-arg VITE_STRIPE_PUBLISHABLE_KEY="${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}" \
            --build-arg VITE_STRIPE_PRICE_MONTHLY_STARTER="${{ secrets.VITE_STRIPE_PRICE_MONTHLY_STARTER }}" \
            --build-arg VITE_STRIPE_PRODUCT_KEY_STARTER="${{ secrets.VITE_STRIPE_PRODUCT_KEY_STARTER }}" \
            --build-arg VITE_STRIPE_PRICE_MONTHLY_STANDARD="${{ secrets.VITE_STRIPE_PRICE_MONTHLY_STANDARD }}" \
            --build-arg VITE_STRIPE_PRODUCT_KEY_STANDARD="${{ secrets.VITE_STRIPE_PRODUCT_KEY_STANDARD }}" \
            --build-arg VITE_STRIPE_PRICE_MONTHLY_PREMIUM="${{ secrets.VITE_STRIPE_PRICE_MONTHLY_PREMIUM }}" \
            --build-arg VITE_STRIPE_PRODUCT_KEY_PREMIUM="${{ secrets.VITE_STRIPE_PRODUCT_KEY_PREMIUM }}" \
            --build-arg VITE_BRIDGE_CLIENT_ID="${{ secrets.VITE_BRIDGE_CLIENT_ID }}" \
            --build-arg VITE_BRIDGE_CLIENT_SECRET="${{ secrets.VITE_BRIDGE_CLIENT_SECRET }}" \
            --build-arg VITE_BRIDGE_BASE_URL="${{ secrets.VITE_BRIDGE_BASE_URL }}" \
            --build-arg VITE_BRIDGE_ENV="${{ secrets.VITE_BRIDGE_ENV }}" \
            .

      - name: Save Docker image
        run: |
          docker save bailogenius-front:latest -o /home/gaignerot/bailogenius-front/bailogenius-front.tar

      - name: Copy deployment files
        run: |
          cp docker-compose.yml /home/gaignerot/bailogenius-front/
          cp deploy.sh /home/gaignerot/bailogenius-front/
          cp cloudflared-config.yml /home/gaignerot/bailogenius-front/
          chmod +x /home/gaignerot/bailogenius-front/deploy.sh

      - name: Deploy application
        run: |
          cd /home/gaignerot/bailogenius-front
          ./deploy.sh

      - name: Verify deployment
        run: |
          sleep 10
          docker ps | grep bailogenius-front || exit 1

      - name: Send deployment notification
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "🌐 Application is live at https://bailogenius.gaignerot.com"
