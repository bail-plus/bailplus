version: '3.8'

services:
  bailogenius-front:
    image: bailogenius-front:latest
    container_name: bailogenius-front
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - bailogenius-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  bailogenius-network:
    driver: bridge
